name: CI

on:
    push:
        branches: [main, master]
    pull_request:
        branches: [main, master]

jobs:
    lua-lint:
        name: Lua Lint
        runs-on: ubuntu-latest
        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Install LuaRocks
              run: sudo apt-get install -y luarocks

            - name: Install luacheck
              run: sudo luarocks install luacheck

            - name: Run luacheck
              run: luacheck lua/

    test:
        name: Tests
        runs-on: ubuntu-latest
        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Install Neovim
              uses: rhysd/action-setup-vim@v1
              with:
                  neovim: true
                  version: stable

            - name: Install test dependencies
              run: |
                  mkdir -p ~/.local/share/nvim/lazy
                  git clone --depth 1 https://github.com/nvim-lua/plenary.nvim ~/.local/share/nvim/lazy/plenary.nvim
                  git clone --depth 1 https://github.com/nvim-neotest/nvim-nio ~/.local/share/nvim/lazy/nvim-nio

            - name: Run tests
              timeout-minutes: 5
              run: |
                  timeout 120 nvim --headless -u tests/minimal_init.lua \
                    -c "PlenaryBustedDirectory tests/ {minimal_init='tests/minimal_init.lua'}" \
                    2>&1 | tee /tmp/test-output.txt || true
                  # Check test results from output (plenary may exit non-zero due to background noise)
                  if grep -q "Failed :.*[1-9]" /tmp/test-output.txt; then
                    echo "Tests failed"
                    exit 1
                  fi
                  if grep -q "Tests Failed" /tmp/test-output.txt; then
                    echo "Tests failed"
                    exit 1
                  fi
                  if ! grep -q "Success" /tmp/test-output.txt; then
                    echo "No test output found"
                    exit 1
                  fi
                  echo "All tests passed"

    documentation:
        name: Documentation Checks
        runs-on: ubuntu-latest
        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Check README links
              run: |
                  # Basic check for broken internal links
                  grep -n "](\./" README.md | while read line; do
                    file=$(echo "$line" | sed 's/.*](\.\///g' | sed 's/).*//g')
                    if [ ! -f "$file" ]; then
                      echo "Broken link found: $file"
                      exit 1
                    fi
                  done

            - name: Validate plugin structure
              run: |
                  # Check required files exist
                  test -f lua/al/init.lua || (echo "Missing lua/al/init.lua" && exit 1)
                  test -f README.md || (echo "Missing README.md" && exit 1)
                  echo "Plugin structure is valid"
